<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bas sach bolna</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", sans-serif;
      color: #fff;
      overflow: hidden;

      background: radial-gradient(circle at top, #1f1c2c, #0f0c29 60%, #000000);
    }

    .container {
      position: relative;
      text-align: center;
      padding: 30px 20px;
      max-width: 90%;

      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 40px rgba(255, 255, 255, 0.08);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 10px;
      font-weight: 500;
    }

    p {
      font-size: 15px;
      color: #d1d1d1;
      margin-bottom: 30px;
    }

    button {
      display: block;
      width: 230px;
      margin: 12px auto;
      padding: 12px;
      font-size: 15px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: #fff;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    button:hover {
      transform: scale(1.05);
      border-color: #fff;
      box-shadow: 0 0 12px rgba(255,255,255,0.25);
    }

    #message {
      margin-top: 25px;
      font-size: 15px;
      color: #e8e8e8;
      line-height: 1.6;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Chalo ek baar settle karte hain 🙂</h1>
    <p>sach bolna… juth ni</p>

    <!-- ESCAPING BUTTON -->
    <button id="raghavBtn" ontouchstart="moveButton()" onmouseover="moveButton()">
      Raghav ki galti thi 😔
    </button>

    <!-- NORMAL BUTTON -->
    <button onclick="herFault()">
      Anshika ki galti thi 😏
    </button>

    <div id="message"></div>
  </div>

  <script>
    function herFault() {
      document.getElementById("message").innerHTML =
        "Haan haan… Anshika ki galti thi 😏<br><br>" +
        "Par sach bolu… Raghav kaafi dino se thoda bhara hua tha.<br>" +
        "Bas feel ho raha tha ki Anshika pehle jaisi baat nahi kar rahi…<br><br>" +
        "Isliye uss din sab nikal gaya.<br><br>" +
        "Intent galat nahi tha… bas tareeka galat tha.<br><br>" +
        "Ab decide tu kar… baat karni hai ya attitude rakhna hai 🙂";
    }

    function moveButton() {
      const btn = document.getElementById("raghavBtn");
      const container = document.querySelector(".container");

      const containerRect = container.getBoundingClientRect();

      const btnWidth = btn.offsetWidth;
      const btnHeight = btn.offsetHeight;

      const maxX = containerRect.width - btnWidth - 10;
      const maxY = containerRect.height - btnHeight - 10;

      const x = Math.random() * maxX;
      const y = Math.random() * maxY;

      btn.style.position = "absolute";
      btn.style.left = x + "px";
      btn.style.top = y + "px";
    }
  </script>

</body>
</html>
