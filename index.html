<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Us vs Ego</title>
  <style>
    body {
      background: linear-gradient(135deg, #0e0e0e, #1a1a1a);
      color: #f5f5f5;
      font-family: "Segoe UI", sans-serif;
      text-align: center;
      padding-top: 100px;
      overflow: hidden;
    }

    h1 {
      font-weight: 500;
      font-size: 32px;
    }

    p {
      color: #bdbdbd;
      margin-bottom: 30px;
    }

    button {
      margin: 15px;
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid #666;
      color: #fff;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      border-color: #fff;
      transform: scale(1.05);
    }

    #message {
      margin-top: 40px;
      font-size: 18px;
      color: #e0e0e0;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>

  <h1>Okay… let’s settle this 😌</h1>
  <p>But don’t overthink it… just go with your heart</p>

  <button onclick="myFault()">Meri galti thi 😔</button>
  <button id="yourBtn" onmouseover="moveButton()">Nahi, teri galti thi 😏</button>

  <div id="message"></div>

  <script>
    function myFault() {
      document.getElementById("message").innerHTML =
        "Fine… I’ll take it 😌<br><br>" +
        "But honestly… arguing with you still felt better than not talking to you at all.<br><br>" +
        "So maybe… let’s not stay like this?";
    }

    function moveButton() {
      const btn = document.getElementById("yourBtn");
      const x = Math.random() * (window.innerWidth - 150);
      const y = Math.random() * (window.innerHeight - 100);
      btn.style.position = "absolute";
      btn.style.left = x + "px";
      btn.style.top = y + "px";
    }
  </script>

</body>
</html>
