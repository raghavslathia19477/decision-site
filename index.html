<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bas sach bolna</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #1a1a1a, #2c2c2c, #121212);
      color: #fff;
      overflow: hidden;
    }

    .container {
      padding: 20px;
      max-width: 90%;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
      font-weight: 500;
    }

    p {
      font-size: 15px;
      color: #cfcfcf;
      margin-bottom: 30px;
    }

    button {
      display: block;
      width: 220px;
      margin: 12px auto;
      padding: 12px;
      font-size: 15px;
      border-radius: 10px;
      border: 1px solid #666;
      background: rgba(255,255,255,0.05);
      color: #fff;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      border-color: #fff;
      transform: scale(1.05);
    }

    #message {
      margin-top: 30px;
      font-size: 16px;
      color: #e0e0e0;
      line-height: 1.5;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Chalo ek baar settle karte hain 🙂</h1>
    <p>sach bolna… juth ni</p>

    <button onclick="myFault()">Raghav ki galti thi 😔</button>
<button id="yourBtn" ontouchstart="moveButton()" onmouseover="moveButton()">Anshika ki galti thi 😏</button>
    <div id="message"></div>
  </div>

  <script>
   function myFault() {
  document.getElementById("message").innerHTML =
    "Theek hai… maan li 😌<br><br>" +
    "Sach bolu… Raghav kaafi dino se thoda bhara hua tha.<br>" +
    "Bas feel ho raha tha ki Anshika pehle jaisi baat nahi kar rahi…<br><br>" +
    "Isliye uss din sab nikal gaya.<br><br>" +
    "Intent galat nahi tha… bas tareeka galat tha.";
}

    function moveButton() {
      const btn = document.getElementById("yourBtn");

      const maxX = window.innerWidth - btn.offsetWidth - 20;
      const maxY = window.innerHeight - btn.offsetHeight - 20;

      const x = Math.random() * maxX;
      const y = Math.random() * maxY;

      btn.style.position = "absolute";
      btn.style.left = x + "px";
      btn.style.top = y + "px";
    }
  </script>

</body>
</html>
