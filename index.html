<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bas sach bolna</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", sans-serif;
      color: #fff;
      background: radial-gradient(circle at top, #1f1c2c, #0f0c29 60%, #000000);
    }

    .container {
      position: relative;
      width: 90%;
      max-width: 400px;
      height: 75vh; /* 🔥 taller container */

      padding: 20px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 40px rgba(255,255,255,0.08);

      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 22px;
      margin-top: 10px;
    }

    p {
      font-size: 14px;
      color: #ccc;
      margin-bottom: 20px;
    }

    button {
      width: 220px;
      padding: 12px;
      font-size: 15px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: #fff;
      cursor: pointer;
      transition: 0.25s;
      position: absolute;
    }

    button:hover {
      transform: scale(1.05);
      border-color: #fff;
    }

    /* 🔥 FIXED POSITIONS */
    #raghavBtn {
      top: 35%;   /* middle area (moving zone) */
    }

    #anshikaBtn {
      bottom: 20px; /* always bottom → far away */
    }

    #message {
      position: absolute;
      bottom: 80px;
      text-align: center;
      font-size: 14px;
      color: #e8e8e8;
      line-height: 1.6;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>Chalo ek baar settle karte hain 🙂</h1>
  <p>sach bolna… juth ni</p>

  <!-- MOVING BUTTON -->
  <button id="raghavBtn" ontouchstart="moveButton()" onmouseover="moveButton()">
    Raghav ki galti thi 😔
  </button>

  <!-- FIXED BUTTON -->
  <button id="anshikaBtn" onclick="herFault()">
    Anshika ki galti thi 😏
  </button>

  <div id="message"></div>

</div>

<script>
function herFault() {
  document.getElementById("message").innerHTML =
    "Haan haan… Anshika ki galti thi 😏<br><br>" +
    "Par sach bolu… Raghav kaafi dino se thoda bhara hua tha.<br>" +
    "Bas feel ho raha tha ki Anshika pehle jaisi baat nahi kar rahi…<br><br>" +
    "Isliye uss din sab nikal gaya.<br><br>" +
    "Intent galat nahi tha… bas tareeka galat tha.<br><br>" +
    "Ab decide tu kar… baat karni hai ya attitude rakhna hai 🙂";
}

function moveButton() {
  const btn = document.getElementById("raghavBtn");
  const container = document.querySelector(".container");

  const rect = container.getBoundingClientRect();

  const maxX = rect.width - btn.offsetWidth - 10;

  /* 🔥 ONLY MOVE IN UPPER AREA (keeps distance) */
  const maxY = rect.height * 0.5;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  btn.style.left = x + "px";
  btn.style.top = y + "px";
}
</script>

</body>
</html>
